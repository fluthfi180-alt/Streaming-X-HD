<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE+ Streaming</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(180deg,#020617 0%,#0f172a 100%);
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
}

/* Background Glow */
body::before{
    content:'';
    position:fixed;
    width:300px;
    height:300px;
    background:#ef4444;
    filter:blur(120px);
    top:-100px;
    left:-100px;
    opacity:.15;
    z-index:-1;
}

body::after{
    content:'';
    position:fixed;
    width:300px;
    height:300px;
    background:#2563eb;
    filter:blur(120px);
    bottom:-100px;
    right:-100px;
    opacity:.15;
    z-index:-1;
}

/* Navbar */
nav{
    display:flex;
    justify-content:center;
    padding:24px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:28px;
    font-weight:800;
}

.dot{
    width:12px;
    height:12px;
    background:#ef4444;
    border-radius:50%;
    box-shadow:0 0 15px #ef4444;
}

/* Hero */
.hero{
    min-height:calc(100vh - 80px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.content{
    width:100%;
    max-width:900px;
    text-align:center;
}

.badge{
    display:inline-block;
    background:rgba(239,68,68,.15);
    border:1px solid rgba(239,68,68,.4);
    color:#ff6b6b;
    padding:8px 18px;
    border-radius:999px;
    margin-bottom:20px;
}

h1{
    font-size:48px;
    font-weight:800;
    margin-bottom:15px;
}

p{
    color:#94a3b8;
    margin-bottom:30px;
    line-height:1.8;
}

/* Thumbnail */
.thumbnail{
    position:relative;
    overflow:hidden;
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
    margin-bottom:25px;
}

.thumbnail img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    display:block;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,.7),
        rgba(0,0,0,.1)
    );
}

/* YouTube Play Button */
.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:65px;
    background:#ff0000;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 10px 30px rgba(255,0,0,.45);
}

.play-btn span{
    width:0;
    height:0;
    border-top:12px solid transparent;
    border-bottom:12px solid transparent;
    border-left:20px solid white;
    margin-left:5px;
}

.play-btn:hover{
    transform:translate(-50%,-50%) scale(1.08);
    background:#ff1a1a;
}

/* Server Buttons */
.buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

.button{
    padding:12px 24px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:600;
    background:#1e293b;
    border:1px solid rgba(255,255,255,.08);
    transition:.3s;
}

.button:hover{
    transform:translateY(-3px);
    background:#334155;
}

.active{
    background:#ef4444;
}

/* Footer */
footer{
    text-align:center;
    padding:25px 20px;
    color:#64748b;
    font-size:14px;
    border-top:1px solid rgba(255,255,255,.05);
    margin-top:40px;
}

footer span{
    color:#ef4444;
    font-weight:600;
}

/* Responsive */
@media(max-width:768px){

    h1{
        font-size:32px;
    }

    .play-btn{
        width:70px;
        height:50px;
    }

    .play-btn span{
        border-top:9px solid transparent;
        border-bottom:9px solid transparent;
        border-left:16px solid white;
    }

    .button{
        width:100%;
    }
}
</style>
</head>
<body>

<nav>
    <div class="logo">
        <span class="dot"></span>
        LIVE+
    </div>
</nav>

<section class="hero">
    <div class="content">

        <div class="badge">
            🔴 LIVE STREAMING
        </div>

        <h1>Watch Your Favorite Match Live</h1>

        <p>
            Nikmati streaming berkualitas HD dengan tampilan modern
            dan responsif di semua perangkat.
        </p>

        <div class="thumbnail">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh1sxntMjHDIfAR9vme1z4D5700hgJaCqyubPdkvlnbYBFbdSof0rgSkNspsaAt91NwSojNxI6BGlN8oMBFyWlW_1BxDBJqehyphenhyphen198syTPaQRvd_DVR5ZXPBmLIEeKP37NT5Ye1fYR_y_dBuA6uxvANf-im6LY43T3NO2GGPJPEmTrze76ySRdQXwW1ROMY/w400-h266/16045.png" alt="Thumbnail">

            <div class="overlay"></div>

            <div class="play-btn">
                <span></span>
            </div>
        </div>

        <div class="buttons">
            <a href="https://obscenityforearm.com/igy01v8m5?key=2a186ef4844031d9f2893da2beda229e" class="button active">
                Server 1
            </a>

            <a href="https://s.shopee.co.id/4qDIKSATNN" class="button">
                Server 2
            </a>

            <a href="https://obscenityforearm.com/igy01v8m5?key=2a186ef4844031d9f2893da2beda229e" class="button">
                Server 3
            </a>
        </div>

    </div>
</section>

<footer>
    © 2026 <span>LIVE+ Streaming</span>. All Rights Reserved.
</footer>
